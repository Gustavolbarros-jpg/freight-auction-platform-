global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "auction-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auction-service:8081"]

  - job_name: "bid-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["bid-service:8082"]

  - job_name: "auth-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auth-service:8084"]