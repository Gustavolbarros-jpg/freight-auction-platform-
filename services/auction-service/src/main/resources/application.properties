spring.application.name=auction-service
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/freight_auction
spring.datasource.username=freight_user
spring.datasource.password=example
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_auction
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:password}

auth.jwt.secret=${AUTH_JWT_SECRET:change-this-development-secret-with-32-chars}

bid.service.url=${BID_SERVICE_URL:http://localhost:8082}

spring.threads.virtual.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
spring.mongodb.uri=${MONGO_URL:mongodb://root:example@localhost:27017/audit_db?authSource=admin}
spring.mongodb.database=audit_db
