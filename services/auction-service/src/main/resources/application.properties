spring.application.name=auction-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/freight_auction
spring.datasource.username=freight_user
spring.datasource.password=example
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_auction
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

auth.jwt.secret=${AUTH_JWT_SECRET:change-this-development-secret-with-32-chars}

bid.service.url=${BID_SERVICE_URL:http://localhost:8082}

spring.threads.virtual.enabled=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true