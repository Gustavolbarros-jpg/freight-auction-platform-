server:
  port: 8080

spring:
  application:
    name: api-gateway

cloud:
  gateway:
    server:
      webmvc:
        routes:

          - id: auth-route
            uri: http://localhost:8084
            predicates:
              - Path=/v1/auth/**

          - id: auction-loads-route
            uri: http://localhost:8081
            predicates:
              - Path=/v1/loads/**

          - id: auction-auctions-route
            uri: http://localhost:8081
            predicates:
              - Path=/v1/auctions/**

          - id: bid-service
            uri: http://localhost:8082
            predicates:
              - Path=/v1/bids/**


