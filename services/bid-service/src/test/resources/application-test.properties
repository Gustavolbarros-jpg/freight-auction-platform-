# datasource vem do DynamicPropertySource (Testcontainers)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration-test
spring.flyway.table=flyway_schema_history_bid
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3
spring.rabbitmq.listener.simple.auto-startup=true
auth.jwt.secret=integration-test-secret-with-32-chars!!
auction.service.url=http://localhost:9999