spring.application.name=auth-service
server.port=8084

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/freight_auction}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:freight_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:example}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_auth
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

auth.jwt.secret=${AUTH_JWT_SECRET:change-this-development-secret-with-32-chars}
auth.jwt.expiration-minutes=${AUTH_JWT_EXPIRATION_MINUTES:60}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
