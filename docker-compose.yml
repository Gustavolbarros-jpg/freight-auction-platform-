services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: freight_auction
      POSTGRES_USER: freight_user
      POSTGRES_PASSWORD: example
    volumes:
      - leilao_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U freight_user -d freight_auction"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis  

    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: audit_db
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    networks:
      - leilao_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  leilao_net:
    driver: bridge

volumes:
  leilao_data:
  mongo_data: