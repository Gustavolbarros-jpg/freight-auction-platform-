services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: freight_auction
      POSTGRES_USER: freight_user
      POSTGRES_PASSWORD: example
    volumes:
      - leilao_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight_user -d freight_auction"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: audit_db
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  auction-service:
    build:
      context: ./services/auction-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freight_auction
      SPRING_DATASOURCE_USERNAME: freight_user
      SPRING_DATASOURCE_PASSWORD: example
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-this-development-secret-with-32-chars}
      BID_SERVICE_URL: http://bid-service:8082
      MONGO_URL: mongodb://root:example@mongo:27017
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - leilao_net

  bid-service:
    build:
      context: ./services/bid-service
    ports:
      - "8082:8082"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freight_auction
      SPRING_DATASOURCE_USERNAME: freight_user
      SPRING_DATASOURCE_PASSWORD: example
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-this-development-secret-with-32-chars}
      AUCTION_SERVICE_URL: http://auction-service:8081
      MONGO_URL: mongodb://root:example@mongo:27017
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      auction-service:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - leilao_net

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freight_auction
      SPRING_DATASOURCE_USERNAME: freight_user
      SPRING_DATASOURCE_PASSWORD: example
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-this-development-secret-with-32-chars}
      AUTH_JWT_EXPIRATION_MINUTES: 60
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leilao_net

  notification-service:
    build:
      context: ./services/notification-service
    ports:
      - "8083:8083"
    environment:
      WS_PORT: 8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - leilao_net

networks:
  leilao_net:
    driver: bridge

volumes:
  leilao_data:
  mongo_data:
